<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Management Performance Dashboard</title>
  <style>
    :root {
      --ocean: #007AC5;
      --shallow-ocean: #97D7FE;
      --as24-yellow: #FFF200;
      --lagoon: #59D7BB;
      --black: #000000;
      --white: #FFFFFF;
      --line: rgba(0, 0, 0, 0.14);
      --muted: rgba(0, 0, 0, 0.62);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--white);
      color: var(--black);
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
    }
    .login-card {
      width: min(460px, 100%);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 28px;
      background: var(--white);
      border-top: 5px solid var(--ocean);
    }
    .eyebrow {
      margin: 0 0 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.76rem;
      font-weight: 760;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 5vw, 2.1rem);
      line-height: 1.08;
      font-weight: 780;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }
    label {
      display: grid;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 650;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px;
      font: inherit;
      color: var(--black);
      background: var(--white);
    }
    button {
      width: 100%;
      margin-top: 14px;
      border: 1px solid var(--ocean);
      border-radius: 14px;
      padding: 13px 14px;
      background: var(--ocean);
      color: var(--white);
      font: inherit;
      font-weight: 750;
      cursor: pointer;
    }
    button:disabled { opacity: 0.65; cursor: not-allowed; }
    .status {
      min-height: 22px;
      margin-top: 14px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .status.error {
      color: var(--black);
      background: rgba(255, 242, 0, 0.55);
      border-radius: 10px;
      padding: 9px 10px;
    }
  </style>
</head>
<body>
  <main class="login-card" aria-labelledby="loginTitle">
    <div class="eyebrow">Protected Dashboard</div>
    <h1 id="loginTitle">Management Performance Dashboard</h1>
    <p>Enter the dashboard password to unlock the current management view.</p>
    <form id="unlockForm">
      <label>
        Password
        <input id="dashboardPassword" type="password" autocomplete="current-password" autofocus>
      </label>
      <button id="unlockButton" type="submit">Unlock Dashboard</button>
      <div class="status" id="unlockStatus" role="status" aria-live="polite"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById("unlockForm");
    const passwordInput = document.getElementById("dashboardPassword");
    const button = document.getElementById("unlockButton");
    const statusNode = document.getElementById("unlockStatus");
    const payload = JSON.parse(document.getElementById("encryptedDashboardPayload").textContent);

    function base64ToBytes(value) {
      return Uint8Array.from(atob(value), char => char.charCodeAt(0));
    }

    function normalizePassword(value) {
      return String(value || "").replace("daschboard", "dashboard");
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: base64ToBytes(payload.salt), iterations: payload.iterations, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlockDashboard(password) {
      const key = await deriveKey(normalizePassword(password));
      const encrypted = base64ToBytes(payload.data);
      const tag = base64ToBytes(payload.tag);
      const cipherText = new Uint8Array(encrypted.length + tag.length);
      cipherText.set(encrypted, 0);
      cipherText.set(tag, encrypted.length);
      const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: base64ToBytes(payload.iv), tagLength: 128 },
        key,
        cipherText
      );
      const html = new TextDecoder().decode(decrypted);
      document.open();
      document.write(html);
      document.close();
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      statusNode.className = "status";
      statusNode.textContent = "Unlocking dashboard...";
      button.disabled = true;
      try {
        await unlockDashboard(passwordInput.value);
      } catch (error) {
        statusNode.className = "status error";
        statusNode.textContent = "Password could not unlock the dashboard. Please check the password and try again.";
        button.disabled = false;
        passwordInput.select();
      }
    });
  </script>
